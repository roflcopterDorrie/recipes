recipes.quick_create:
  path: '/admin/recipes/quick-create'
  defaults:
    _title: 'Quickly create recipe'
    _form: '\Drupal\recipes\Form\QuickCreate'
  requirements:
    _permission: 'access content'
recipes.settings:
  path: '/admin/config/services/recipes'
  defaults:
    _title: 'Settings'
    _form: 'Drupal\recipes\Form\SettingsForm'
  requirements:
    _permission: 'administer site configuration'
recipes.ingredient_preview:
  path: '/recipes/ingredient-preview/{ingredient_id}'
  defaults:
    _controller: '\Drupal\recipes\Controller\IngredientPreviewController::preview'
  requirements:
    _permission: 'access content'
